  frontend_ts_files:
    - 'src/main/webapp/angular/src/app/components/spcm00021/spcm00021.component.ts'
  frontend_html_files:
    - 'src/main/webapp/angular/src/app/components/spcm00021/spcm00021.component.html'
  dominant_style_note: 'Reuse the current JAX-RS webservice plus process split, `StringBuilder` SQL assembly style, and Angular screen-family layout patterns from the chosen anchor files instead of inventing a new export-specific structure.'
  new_structure_scope: '`yes` for one additive audit table; `no` for new backend source families and `no` for new screen structure.'
