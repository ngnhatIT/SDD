openapi: 3.0.3
info:
  title: Customer Search CSV Export API
  version: "2026-03-11"
  description: >
    Machine-readable contract for the example customer search CSV export feature.
servers:
  - url: /
paths:
  /webapi/customer-search/export-csv:
    post:
      operationId: exportCustomerSearchCsv
      summary: Export the current customer search result set to CSV
      description: >
        Uses the active search filters and sort order. Company and user context are
        taken from the authenticated request, not from the body.
      tags:
        - customer-search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./schemas/customer-search-export-request.schema.json
      responses:
        "200":
          description: CSV file stream
          headers:
            Content-Disposition:
              description: Attachment file name
              schema:
                type: string
                example: attachment; filename="customer-search-20260311-153000.csv"
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          description: Matching row count exceeds export limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                limitExceeded:
                  value:
                    code: CUSTOMER_EXPORT_LIMIT_EXCEEDED
                    message: Export is limited to 10,000 rows. Narrow the search criteria and try again.
        "403":
          description: User lacks export permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                forbidden:
                  value:
                    code: CUSTOMER_EXPORT_FORBIDDEN
                    message: You do not have permission to export this data.
        "422":
          description: Filter input is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidFilter:
                  value:
                    code: CUSTOMER_EXPORT_INVALID_FILTER
                    message: Export could not be completed with the supplied filters.
        "500":
          description: Unexpected generation or persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                failed:
                  value:
                    code: CUSTOMER_EXPORT_FAILED
                    message: Export could not be completed. Try again later or contact support.
components:
  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
