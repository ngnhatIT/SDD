nodes:
  - id: 'REQ-01'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'An authorized user can export the current customer search result set from the customer search screen without re-entering filter criteria.'
    certainty: 'explicit'
    method: 'requirements_table'
  - id: 'REQ-02'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'The export returns only the rows the user is allowed to see and respects the same company and data-access filters as the interactive search.'
    certainty: 'explicit'
    method: 'requirements_table'
  - id: 'REQ-03'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'If the matching row count exceeds `10,000`, the system blocks the export and returns an actionable message instead of generating a partial file.'
    certainty: 'explicit'
    method: 'requirements_table'
  - id: 'REQ-04'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'Each export attempt writes an audit record with company, user, screen, timestamp, filter summary, row count, and outcome.'
    certainty: 'explicit'
    method: 'requirements_table'
  - id: 'REQ-05'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'The CSV output uses the approved customer export column order and the same sort order as the on-screen search results.'
    certainty: 'explicit'
    method: 'requirements_table'
  - id: 'REQ-06'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'If export generation fails after the request is accepted, the user sees a user-safe error message and the audit outcome is recorded as `FAILED`.'
    certainty: 'explicit'
    method: 'requirements_table'
  - id: 'DES-01'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Add a dedicated export action to the existing customer search screen instead of creating a separate export screen.'
    certainty: 'explicit'
    method: 'design_table'
  - id: 'DES-02'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Reuse the existing customer search criteria builder so on-screen search and export use the same filter, sort, and visibility logic.'
    certainty: 'explicit'
    method: 'design_table'
  - id: 'DES-03'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Run a count query before file generation and block requests above `10,000` rows.'
    certainty: 'explicit'
    method: 'design_table'
  - id: 'DES-04'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Keep export synchronous for this feature because the limit is bounded and the output is generated from a single request.'
    certainty: 'explicit'
    method: 'design_table'
  - id: 'DES-05'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Persist an audit row for both `SUCCESS` and `FAILED` outcomes in a dedicated audit table.'
    certainty: 'explicit'
    method: 'design_table'
  - id: 'DES-06'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Use the shared CSV module family for file creation and define one explicit export column order for the screen.'
    certainty: 'explicit'
    method: 'design_table'
  - id: 'TASK-01'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Add export endpoint, request DTO, permission check, and request validation'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-02'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Reuse search criteria builder and add pre-export count guard with the `10,000` row limit'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-03'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Generate the CSV through the shared CSV pattern and persist success or failure audit rows'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-04'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Add frontend export button, loading state, blob download handling, and business error handling'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-05'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Add database migration for the audit table and retention-ready indexes'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-06'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Complete verification, rollout notes, implementation report, and review report'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'AC-01'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'An authorized user can download a CSV from the customer search screen using the currently applied filters and sort order.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-02'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'The exported rows and ordering match the same filtered result set the user is allowed to see on screen.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-03'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'When the matching row count exceeds `10,000`, the export is blocked before file generation and the user sees the configured business message.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-04'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'A successful export creates one audit row with user, company, screen, filter summary, row count, and `SUCCESS` status.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-05'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'A failed export creates one audit row with `FAILED` status and an error code, and the user receives a user-safe error message.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'TC-01'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Search with a filter set that returns `250` rows, then export.'
    test_type: 'Integration'
    certainty: 'explicit'
    method: 'tests_table'
  - id: 'TC-02'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Open the screen with a search result count of `0`.'
    test_type: 'UI'
    certainty: 'explicit'
    method: 'tests_table'
  - id: 'TC-03'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Search with a filter set that returns `10,001` rows, then export.'
    test_type: 'Integration'
    certainty: 'explicit'
    method: 'tests_table'
  - id: 'TC-04'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Attempt export with a user lacking export permission.'
    test_type: 'Integration'
    certainty: 'explicit'
    method: 'tests_table'
  - id: 'TC-05'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Verify the audit row after a successful export.'
    test_type: 'Database'
    certainty: 'explicit'
    method: 'tests_table'
  - id: 'TC-06'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Simulate CSV writer failure after the export request is accepted.'
    test_type: 'Integration'
    certainty: 'explicit'
    method: 'tests_table'
  - id: 'TC-07'
    kind: 'test'
    source_file: '09-test-cases.md'
    summary: 'Export results sorted by `lastContactDate DESC`.'
    test_type: 'Integration'
    certainty: 'explicit'
    method: 'tests_table'
