  title: 'Task-profile routing for agent markdown loading'
  owner: 'Codex'
  status: 'ready-for-review'
  last_updated: '2026-03-13'
  classification: 'reduced-path'
  package_root: 'docs/specs/2026-03-13-task-profile-routing'
