nodes:
  - id: 'REQ-01'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'The repository must define canonical task profiles for `implement-new`, `fix-from-pack`, `fix-from-bug`, `review-from-pack`, and `review-from-rules`.'
    certainty: 'explicit'
    method: 'requirements_heading'
  - id: 'REQ-02'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'The repository must define a prompt header contract and selection precedence so agents can resolve the task profile, feature package, spec-pack, backend helper, bug source, and review scope deterministically.'
    certainty: 'explicit'
    method: 'requirements_heading'
  - id: 'REQ-03'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'Governance and review rules must state that task profiles do not override whether a governing feature package is required, and that generated spec-packs remain execution aids only.'
    certainty: 'explicit'
    method: 'requirements_heading'
  - id: 'REQ-04'
    kind: 'requirement'
    source_file: '01-requirements.md'
    summary: 'The repository must define `spec_back.md` as a helper-only backend-facing alias rather than a new source of truth.'
    certainty: 'explicit'
    method: 'requirements_heading'
  - id: 'DES-01'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Define task profiles in a dedicated context file instead of burying them inside one governance rule.'
    certainty: 'explicit'
    method: 'design_heading'
  - id: 'DES-02'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Use a fixed prompt header to select task profiles rather than auto-detecting from free-form wording.'
    certainty: 'explicit'
    method: 'design_heading'
  - id: 'DES-03'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Keep governance classification separate from task-profile routing.'
    certainty: 'explicit'
    method: 'design_heading'
  - id: 'DES-04'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Keep `spec-pack` optional by governance, but make it required for `fix-from-pack` and `review-from-pack`.'
    certainty: 'explicit'
    method: 'design_heading'
  - id: 'DES-05'
    kind: 'decision'
    source_file: '02-design.md'
    summary: 'Treat `spec_back.md` as helper-only input and define `alias:backend-spec` as shorthand for the backend-facing subset of canonical artifacts.'
    certainty: 'explicit'
    method: 'design_heading'
  - id: 'TASK-01'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Add canonical task-profile routing docs, including the prompt header contract and load matrix.'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-02'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Update AGENTS and AI loading order so task-profile selection is part of the agent-loading contract.'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-03'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Update governance and spec guidance so task profiles do not bypass canonical feature-package rules and spec-pack remains optional except where the profile requires it.'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'TASK-04'
    kind: 'task'
    source_file: '07-tasks.md'
    summary: 'Add canonical task-profile request examples and document helper-only handling for `spec_back.md`.'
    certainty: 'explicit'
    method: 'tasks_table'
  - id: 'AC-01'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'The repository defines canonical task profiles, a fixed prompt header contract, and deterministic selection precedence for agent work.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-02'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'Governance and review guidance state that task profiles do not bypass governing feature-package rules and that spec-pack remains an execution aid only.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-03'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'The repository contains canonical examples for the five task profiles, and `spec_back.md` is documented as helper-only with an alias mapping to backend-facing canonical artifacts.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'AC-04'
    kind: 'acceptance'
    source_file: '08-acceptance-criteria.md'
    summary: 'The new task-profile feature package itself is structurally valid and passes spec validation without requiring a spec-pack manifest.'
    certainty: 'explicit'
    method: 'acceptance_table'
  - id: 'TC-01'
    kind: 'test'
    source_file: '09-test-cases.md'
